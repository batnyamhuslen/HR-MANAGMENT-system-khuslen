<aside class="sidebar" [class.open]="sidebarOpen()">
  <div class="sidebar-header">
    <i class="ti ti-briefcase"></i>
    <span>HR CORE</span>
  </div>
  <nav class="sidebar-nav">
    <a routerLink="/dashboard" routerLinkActive="active" (click)="closeSidebar()">
      <i class="ti ti-dashboard"></i><span>Хянах самбар</span>
    </a>
    @if (isHrAdmin()) {
      <a routerLink="/employees" routerLinkActive="active" (click)="closeSidebar()">
        <i class="ti ti-users"></i><span>Ажилтнууд</span>
      </a>
      <a routerLink="/attendance" routerLinkActive="active" (click)="closeSidebar()">
        <i class="ti ti-calendar-check"></i><span>Ирц</span>
      </a>
      <a routerLink="/leave" routerLinkActive="active" (click)="closeSidebar()">
        <i class="ti ti-calendar-off"></i><span>Чөлөө</span>
      </a>
      <a routerLink="/payroll" routerLinkActive="active" (click)="closeSidebar()">
        <i class="ti ti-coin"></i><span>Цалин</span>
      </a>
    } @else {
      <a routerLink="/payroll/my-payslips" routerLinkActive="active" (click)="closeSidebar()">
        <i class="ti ti-coin"></i><span>Цалингийн хуудас</span>
      </a>
    }
  </nav>
  @if (currentUser(); as user) {
    <div class="sidebar-footer">
      <div class="avatar">{{ user.initials }}</div>
      <div class="user-info">
        <div class="name">{{ user.fullName }}</div>
        <div class="role">{{ user.roleLabel }}</div>
      </div>
      <button class="logout-btn" (click)="logout()" title="Гарах">
        <i class="ti ti-logout"></i>
      </button>
    </div>
  }
</aside>

<div class="backdrop" [class.open]="sidebarOpen()" (click)="closeSidebar()"></div>

<div class="main">
  <header class="topbar">
    <button class="hamburger" (click)="toggleSidebar()">
      <i class="ti ti-menu-2"></i>
    </button>
    <div class="search-box">
      <i class="ti ti-search"></i>
      <input type="text" placeholder="Хайх...">
    </div>
    <div class="topbar-right">
      <app-notification-bell></app-notification-bell>
      @if (currentUser(); as user) {
        <div class="mobile-avatar">{{ user.initials }}</div>
      }
    </div>
  </header>

  <div class="content" [@routeAnimations]="getRouteAnimationData()">
    <div class="route-container">
      <router-outlet />
    </div>
  </div>
</div>
