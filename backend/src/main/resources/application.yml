server:
  port: 8080

spring:
  application:
    name: hr-management

  datasource:
    url: jdbc:postgresql://127.0.0.1:5433/HR_Khuslen
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

app:
  jwt:
    secret: 5a3f8c2b1e7d9f0a4b6c8d2e1f3a5b7c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4
    expiration-ms: 86400000

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL:jdbc:postgresql://127.0.0.1:5433/HR_Khuslen}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    show-sql: false

app:
  jwt:
    secret: ${JWT_SECRET:5a3f8c2b1e7d9f0a4b6c8d2e1f3a5b7c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4}
